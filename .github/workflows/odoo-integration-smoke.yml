name: Odoo Integration Smoke

on:
  workflow_dispatch:

jobs:
  inspect-odoo-models:
    name: Inspect Odoo Models
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Validate secrets presence
        env:
          ODOO_HOST: ${{ secrets.ODOO_HOST }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: |
          missing=""
          for key in ODOO_HOST ODOO_DB ODOO_USERNAME ODOO_PASSWORD; do
            value="${!key}"
            if [ -z "$value" ]; then
              missing="$missing $key"
            fi
          done

          if [ -n "$missing" ]; then
            echo "Missing required repository secrets:$missing"
            echo "Configure these secrets to run Odoo integration smoke tests."
            exit 1
          fi

      - name: Validate Odoo connectivity
        env:
          ODOO_HOST: ${{ secrets.ODOO_HOST }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
        run: |
          python - << 'PY'
          import os
          import xmlrpc.client
          host = os.getenv('ODOO_HOST')
          db = os.getenv('ODOO_DB')
          user = os.getenv('ODOO_USERNAME')
          pwd = os.getenv('ODOO_PASSWORD')
          uid = xmlrpc.client.ServerProxy(f"{host}/xmlrpc/2/common").authenticate(db, user, pwd, {})
          print(f"authenticate: {'OK' if uid else 'FAILED'}")
          assert uid, "Odoo authentication failed"
          PY
