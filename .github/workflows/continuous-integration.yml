name: Continuous Integration

on:
  push:
    branches:
      - main
      - dev-features
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    name: Python Code Quality (Scripts & Core)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate task system
        run: |
          python -m codoo task list
          echo "Task system OK"

      - name: Type checking and linting
        run: |
          pip install mypy ruff
          mypy src/codoo --ignore-missing-imports || true
          ruff check src/
