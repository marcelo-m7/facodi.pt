---
# Feature Spec: Smart Field Validation Package
# ID: FEAT-VAL-001
# Priority: HIGH (MVP)
# Target: All Studio Apps
# Estimated Effort: 3-4 days
# SaaS Safe: YES (API-only)

spec_id: FEAT-VAL-001
spec_title: "Smart Field Validation & Auto-Formatting"
spec_type: "feature-pack"
created_date: 2026-04-27

description: |
  Automatic field validation and formatting system for Studio apps.
  Provides reusable validators (email, phone, CPF/CNPJ, currency, dates).
  No custom Python code needed - uses ir.actions.server + client-side constraints.

## =============================================================================
## PHASE 1: PLAN
## =============================================================================

scope:
  models_affected:
    - ir.model.fields (add validation_type field)
    - ir.actions.server (create validation server actions)
  
  fields_added:
    - ir.model.fields.validation_type: Selection(email, phone, cpf, cnpj, currency, date_range, decimal_precision)
    - ir.model.fields.validation_params: Text (JSON config, e.g. {"format": "BR", "min": 0, "max": 999999})
  
  validators_to_implement:
    - email_validator: Check @ and domain, suggest .com/.br
    - phone_formatter: Format to BR standard (+55 11 99999-9999)
    - cpf_validator: 11-digit check-digit validation
    - cnpj_validator: 14-digit check-digit validation
    - currency_formatter: Auto-convert to 2 decimals, parse different separators
    - date_range_validator: Ensure start < end, warn if > 365 days
    - decimal_precision: Round to N decimals (2 for currency, 3 for ratios)

dependencies:
  - Odoo 19.2+
  - open22 or equivalent SaaS instance
  - No custom Python addons

assumptions:
  - Validators run on field change (onchange trigger via server action)
  - Validation errors shown as message toast (not field-level red)
  - Formatting applied before save (cleanup input data)

constraints:
  - SaaS: Cannot use Python custom code, must use ir.actions.server
  - UX: Validators must not block form save, only warn/suggest
  - Perf: Validators must run in < 100ms per field

security_notes:
  - CPF/CNPJ validation for compliance (don't store raw PII)
  - Client can bypass onchange via API, so always validate server-side too

## =============================================================================
## PHASE 2: IMPLEMENT
## =============================================================================

implementation_plan:
  
  step_1_create_validators:
    description: "Build reusable validator functions (Python helpers)"
    location: "src/codoo/odoo/validators.py"
    functions:
      - validate_email(value: str) -> tuple[bool, str] # (is_valid, error_msg)
      - validate_phone(value: str, country: str = "BR") -> str # returns formatted
      - validate_cpf(cpf: str) -> bool # returns True if valid
      - validate_cnpj(cnpj: str) -> bool
      - format_currency(value: str) -> Decimal
      - validate_date_range(start, end) -> tuple[bool, str]
  
  step_2_create_server_actions:
    description: "Wire validators into ir.actions.server"
    location: "docs/logs/ (evidence of manual Studio setup)"
    actions:
      - action_validate_email_field (triggers on field change)
      - action_validate_phone_field
      - action_validate_cpf_field
      - action_validate_currency_field
      - etc.
  
  step_3_create_studio_app_template:
    description: "Template for creating apps with validation pre-configured"
    location: "src/codoo/odoo/studio_templates.py"
    template_fields:
      - can auto-add validation to selected field types
      - pre-populate ir.actions.server with correct validators
  
  step_4_integration_task:
    description: "Create formal task to add validators to any app"
    location: "src/codoo/tasks/features/add_field_validators.py"
    modes:
      - inspect: List all fields, suggest which could validate
      - dry-run: Show what validators would be added
      - apply: Add ir.actions.server, constraints
      - verify: Test validators work (try invalid inputs)

files_to_create:
  - src/codoo/odoo/validators.py (utility validators)
  - src/codoo/odoo/studio_templates.py (template helpers)
  - src/codoo/tasks/features/add_field_validators.py (formal task)
  - docs/guides/STUDIO-VALIDATORS.md (user guide)

## =============================================================================
## PHASE 3: VALIDATE (Gates)
## =============================================================================

validation_gates:
  
  gate_1_install:
    description: "Validators load without errors"
    check: |
      python -m py_compile src/codoo/odoo/validators.py
      from codoo.odoo import validators
      assert hasattr(validators, 'validate_cpf')
    evidence: "compile output + import test log"
  
  gate_2_api_crud:
    description: "Validators can be called via API"
    test: |
      client.call('ir.model', 'create', [{
        'name': 'Test Model',
        'model': 'x_test_val',
        'fields_id': [(0, 0, {
          'name': 'email_field',
          'ttype': 'char',
          'validation_type': 'email'
        })]
      }])
    expected: "Field created with validation_type"
    evidence: "Created field with validation_type set"
  
  gate_3_server_action_test:
    description: "Validators trigger via server action on field change"
    test: |
      # Send bad CPF via API, should trigger server action
      record = client.call('x_test_val', 'create', {
        'cpf_field': '12345678901'  # Invalid CPF
      })
      # Server action should return warning message
    expected: "Validation error returned via message"
    evidence: "API response with validation error"
  
  gate_4_ui_test:
    description: "User enters invalid data, sees validation message"
    test: |
      1. Open app in Odoo UI
      2. Enter invalid email (e.g., "notanemail")
      3. Click outside field
      4. Should see toast message: "Invalid email format"
    expected: "Toast message appears, no error traceback"
    evidence: "Screenshot of validation message"
  
  gate_5_permissions:
    description: "Users can trigger validators (no ACL block)"
    test: |
      Assign non-admin user to app ACL
      Test validators still work
    expected: "Validators work for all permission levels"
    evidence: "Test log from non-admin user"
  
  gate_6_no_js_errors:
    description: "Browser console shows no JavaScript errors"
    test: |
      F12 → Console tab while interacting with fields
    expected: "Console shows no errors, only info/debug logs"
    evidence: "Console screenshot"
  
  gate_7_documentation:
    description: "Features documented for other teams"
    docs:
      - docs/guides/STUDIO-VALIDATORS.md (how-to guide)
      - docs/plans/validator-examples.md (example configs)
    evidence: "Committed docs with examples"
  
  gate_8_evidence_report:
    description: "Execution report with all gates"
    evidence: |
      docs/features/FEAT-VAL-001-execution-report.md
      - Gate results JSON
      - Screenshots/logs for each gate
      - Known issues/limitations

## =============================================================================
## PHASE 4: REPORT
## =============================================================================

success_criteria:
  - All validation gates pass ✓
  - Validators work for: email, phone, CPF, CNPJ, currency, date_range
  - Can be added to any app via task or manual Studio config
  - Documentation complete with examples
  - No performance degradation (fields still save in < 1s)

known_limitations:
  - Client-side only; server-side validation must be separate
  - Cannot do async validation (API calls) due to SaaS constraints
  - Regex patterns limited by browser JavaScript regex engine
  - Validation messages language-locked to Odoo's current language

rollback_strategy:
  - If validator breaks app: Remove ir.actions.server via API
  - If field breaks: Delete validation_type (resets to no validation)
  - Automatic via studio delete-app if needed

handoff:
  - Feature complete and documented
  - Ready for: Training, PR review, production deployment
  - Next: Integrate into multiple production apps

---

## Manifest

This spec can be implemented in order:
1. Implement validators.py (standalone Python module)
2. Wire into ir.actions.server (manual Studio + docs)
3. Create task to automate deployment
4. Run validation gates in order
5. Generate execution report

Estimated time: 3-4 days (full stack)
